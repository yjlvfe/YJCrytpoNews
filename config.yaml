monitoring_services:
  google_alerts:
    queries:
      - "Bitcoin OR BTC"
      - "Ethereum OR ETH"
      - "cryptocurrency regulation"
      - "DeFi hack OR exploit"
      - "ETF Bitcoin OR Ethereum"
    check_interval_minutes: 30
  talkwalker:
    enabled: false
    api_key: ""
  mention:
    enabled: false
    api_key: ""

